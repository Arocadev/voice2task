services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voice2task
      POSTGRES_PASSWORD: voice2task
      POSTGRES_DB: voice2task
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://voice2task:voice2task@db:5432/voice2task
      SECRET_KEY: dev_secret_key_cambia_en_produccion
      GROQ_API_KEY: ${GROQ_API_KEY}
      WHISPER_MODEL: base
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: